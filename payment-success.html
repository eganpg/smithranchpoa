<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Received – Smith Ranch POA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Raleway:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --color-bg:         #f4f2ed;
      --color-header:     #1e3a2f;
      --color-header-text:#f0ece3;
      --color-accent:     #b8962e;
      --color-text:       #2c2c2c;
      --color-link:       #1a4a6b;
      --color-footer:     #1e3a2f;
      --color-footer-text:#f0ece3;
      --color-nav-hover:  #2e5c45;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    h2, h3 { font-family: 'Raleway', sans-serif; }
    main { flex: 1; }
    a { color: var(--color-link); }

    /* ── Header ─────────────────────────────────── */
    header {
      background-color: var(--color-header);
      color: var(--color-header-text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .logo { max-width: 64px; margin: 10px 0; }
    nav { position: static; }
    .nav-links { display: flex; gap: 4px; margin: 0; padding: 0; }
    .nav-links li { margin: 0; }
    .nav-links a {
      color: var(--color-header-text);
      display: block;
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: background-color 0.2s, color 0.2s;
    }
    .nav-links a:hover { background-color: var(--color-nav-hover); color: #fff; }
    .menu-toggle { display: none; }

    @media (max-width: 768px) {
      header { flex-wrap: wrap; padding: 0 16px; gap: 0; }
      .logo { margin: 12px 0; }
      nav { position: static; display: flex; align-items: center; }
      .menu-toggle {
        display: block;
        position: static;
        background: none;
        border: none;
        color: var(--color-header-text);
        font-size: 1.6rem;
        cursor: pointer;
        padding: 8px 0;
        line-height: 1;
      }
      .nav-links {
        display: none;
        flex-direction: column;
        width: 100%;
        padding: 0 0 12px 0;
        gap: 2px;
        background-color: var(--color-header);
        border-top: 1px solid var(--color-nav-hover);
      }
      .nav-links.active { display: flex; }
      .nav-links li { width: 100%; }
      .nav-links a { padding: 12px 8px; border-radius: 4px; }
    }

    /* ── Footer ─────────────────────────────────── */
    footer {
      background-color: var(--color-footer);
      color: var(--color-footer-text);
      width: 100%;
      box-sizing: border-box;
      padding: 24px 32px;
      margin-top: 48px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    footer a { color: var(--color-accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .footer-section { text-align: left; }
    .footer-nav { display: flex; gap: 20px; justify-content: center; }
    .footer-nav a { color: var(--color-footer-text); }
    .footer-nav a:hover { color: var(--color-accent); text-decoration: none; }
    .footer-copy { color: #a0998a; font-size: 0.8rem; text-align: right; }

    @media (max-width: 640px) {
      footer { grid-template-columns: 1fr; text-align: center; gap: 20px; }
      .footer-section { text-align: center; }
      .footer-nav { flex-wrap: wrap; justify-content: center; }
      .footer-copy { text-align: center; }
    }

    /* ── Success card ───────────────────────────── */
    .success-wrap {
      max-width: 480px;
      margin: 72px auto;
      padding: 0 20px;
      text-align: center;
    }
    .checkmark {
      width: 64px;
      height: 64px;
      background-color: var(--color-header);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .checkmark svg {
      width: 32px;
      height: 32px;
      stroke: #fff;
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .success-wrap h2 {
      font-family: 'Raleway', sans-serif;
      font-size: 1.9rem;
      color: var(--color-header);
      margin: 0 0 12px 0;
    }
    .success-wrap p {
      font-size: 0.98rem;
      color: #555;
      line-height: 1.7;
      margin: 0 0 32px 0;
    }
    .home-btn {
      display: inline-block;
      padding: 13px 32px;
      background-color: var(--color-header);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s;
      letter-spacing: 0.02em;
    }
    .home-btn:hover {
      background-color: var(--color-nav-hover);
      color: #fff;
      text-decoration: none;
    }
    .divider {
      width: 48px;
      height: 3px;
      background: var(--color-accent);
      margin: 28px auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/images/logo.jpg" alt="Smith Ranch Logo" class="logo" />
    <nav>
      <button class="menu-toggle" aria-label="Toggle menu">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="documents.html">Documents</a></li>
        <li><a href="links.html">Links</a></li>
        <li><a href="key-request.html">Gate Keys</a></li>
        <li><a href="dues.html">Pay Dues</a></li>
      </ul>
    </nav>
  </header>

  <main style="padding-bottom: 64px;">
    <div class="success-wrap">
      <div class="checkmark">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Payment Received</h2>
      <p>
        Thank you for paying your Smith Ranch POA annual dues.
        A receipt has been sent to your email address.
      </p>
      <div class="divider"></div>
      <a href="index.html" class="home-btn">Return to Home</a>
    </div>
  </main>

  <footer>
    <div class="footer-section">
      <strong>Smith Ranch POA</strong><br />
      <a href="mailto:smithranchpoa@gmail.com">smithranchpoa@gmail.com</a>
    </div>
    <nav class="footer-section footer-nav">
      <a href="index.html">Home</a>
      <a href="documents.html">Documents</a>
      <a href="links.html">Links</a>
      <a href="key-request.html">Gate Keys</a>
      <a href="dues.html">Pay Dues</a>
    </nav>
    <div class="footer-section footer-copy">
      &copy; 2026 Smith Ranch POA
    </div>
  </footer>

  <script>
    document.querySelector(".menu-toggle").addEventListener("click", function () {
      document.querySelector(".nav-links").classList.toggle("active");
    });
  </script>
</body>
</html>
